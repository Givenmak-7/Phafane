<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Main documentation styles -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom.css' | relative_url }}"
    />

  </head>
  <body>

    <!-- Header -->
    <header class="site-header">
      <div class="container">
        <h1 class="site-title">
          <a href="{{ '/' | relative_url }}">
            {{ site.title }}
          </a>
        </h1>
        <p class="site-tagline">
          Technical documentation for the School Website Project
        </p>
      </div>
    </header>

    <!-- Main content -->
    <main class="site-content container">
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container">
        <small>
          © {{ site.time | date: "%Y" }} School Website Project · Built with GitHub Pages
        </small>
      </div>
    </footer>

  </body>
</html>
